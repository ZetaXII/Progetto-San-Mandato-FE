<div class="card-wrapper" [class.active]="isActive" (click)="poiClick.emit(poi)">
    <!-- IMMAGINE -->
    <div class="card-image">
        <img [src]="poi.coverImageUrl || photoManagerService.DEFAULT_IMAGE" [alt]="poi.name" class="card-img"
            (error)="photoManagerService.handleImageError($event)">

        <div class="image-overlay">
            <i class="ri-arrow-right-line"></i>
        </div>
    </div>

    <!-- CONTENUTO -->
    <div class="card-content">

        <h3 class="card-title inter-bold">{{ poi.name }}</h3>

        <div class="card-footer d-flex justify-content-start align-items-center gap-2">
            <span class="category-pill fw-bold">{{ poi.areaGroup }}</span>
        </div>
    </div>
</div>
